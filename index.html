<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    http-equiv="refresh"
    content="0; url=phone.html"
  />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#040711" />
  <title>I Love You Dea</title>
  <style>
    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top, rgba(53, 120, 161, 0.16), transparent 36%),
        radial-gradient(circle at 20% 80%, rgba(255, 67, 98, 0.08), transparent 26%),
        linear-gradient(180deg, #050711 0%, #02030a 45%, #000000 100%);
      color: #fff;
      font-family: "Trebuchet MS", "Lucida Sans Unicode", sans-serif;
    }

    body {
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .card {
      width: min(92vw, 440px);
      padding: 28px;
      border-radius: 28px;
      text-align: center;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), rgba(255, 255, 255, 0.02)),
        rgba(4, 7, 17, 0.82);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow:
        0 24px 80px rgba(0, 0, 0, 0.45),
        0 0 50px rgba(89, 239, 255, 0.1);
    }

    h1 {
      margin: 0 0 10px;
      font-size: clamp(2.2rem, 10vw, 3.6rem);
      line-height: 0.95;
      letter-spacing: -0.05em;
      color: #d7fbff;
      text-shadow:
        0 0 10px rgba(166, 248, 255, 0.95),
        0 0 28px rgba(86, 232, 255, 0.5);
    }

    p {
      margin: 0 0 18px;
      color: rgba(236, 247, 255, 0.74);
      line-height: 1.5;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 18px;
      border-radius: 999px;
      text-decoration: none;
      color: #f3fcff;
      border: 1px solid rgba(165, 248, 255, 0.24);
      background:
        linear-gradient(180deg, rgba(142, 246, 255, 0.22), rgba(142, 246, 255, 0.08)),
        rgba(255, 255, 255, 0.04);
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>i love you dea</h1>
    <p>Opening the page...</p>
    <a href="phone.html">Open animation</a>
  </main>
</body>
</html>
